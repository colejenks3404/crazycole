<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crazycole.com</title>
    <style>
        body { background-color: lightblue; font-family: 'Comic Sans MS', cursive; }
        .main-title { color: darkblue; font-size: 48px; text-align: center; margin-top: 40px; }
        nav { display:flex; align-items:center; justify-content:center; gap:14px; margin: 30px 0; font-size: 18px; }
        nav a { position:relative; margin: 0 6px; padding: 10px 20px; color: darkblue; text-decoration: none; background: linear-gradient(to bottom, #e6f7ff, #bfeaff); border: 2px solid #66b3ff; border-radius: 999px; transition: transform 0.15s ease; font-family: 'Lucida Grande', 'Lucida Sans Unicode', sans-serif; box-shadow: none; }
        /* glossy top half */
        nav a::after { content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 48%; background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.05)); border-radius: 999px; pointer-events: none; }
        nav a:hover { transform: translateY(-2px); }
        /* logout button styling to match nav look */
        #logout-btn { padding: 8px 14px; background: linear-gradient(to bottom, #e6f7ff, #bfeaff); border: 2px solid #66b3ff; border-radius: 999px; color: darkblue; font-weight: bold; cursor: pointer; box-shadow: none; font-family: 'Lucida Grande', 'Lucida Sans Unicode', sans-serif; }
        #user-display { color: navy; font-weight:700; margin-left:6px; margin-right:6px; font-family: 'Lucida Grande', 'Lucida Sans Unicode', sans-serif; }
        /* apply Lucida Grande to regular buttons too and remove any glow */
        button, input[type="button"], input[type="submit"], textarea { font-family: 'Lucida Grande', 'Lucida Sans Unicode', sans-serif; box-shadow: none; }
        .content { display:flex; align-items:flex-start; gap:20px; margin: 40px 20px; }
        #comments-section { max-width: 320px; }
        #comments-list div { background: rgba(255,255,255,0.9); padding:12px; margin-bottom:10px; border-radius:8px; border-left:4px solid #66b3ff; }
    </style>
</head>
<body>
    <h1 class="main-title">WELCOME TO CRAZYCOLE.COM!!</h1>
    <nav>
        <a href="contact.html">Contact</a>
        <a href="photography.html">Photography</a>
        <a href="tech.html">Tech</a>
        <a href="blog.html">Blog</a>
        <a href="games.html">Games</a>
        <a href="3dprinting.html">3D Printing</a>
        <a href="petpics.html">Pet Pics</a>
        <a href="login.html" id="login-link">Login</a>
        <span id="user-display" style="display:none"></span>
        <button id="logout-btn" style="display:none">Logout</button>
    </nav>

    <div class="content">
        <div>
            <img src="images/harriet.jpg" alt="Harriet" style="width:220px; height:auto; display:block; margin-bottom:16px;">
            <h3 style="margin:0 0 8px 0; color:darkblue;">Comments</h3>
            <div id="comments-section">
                <textarea id="comment-input" placeholder="Leave a comment about Harriet..." style="width:100%; height:80px; padding:8px; border:2px solid #66b3ff; border-radius:8px; resize:vertical;"></textarea>
                <br>
                <button id="submit-comment" style="margin-top:8px; padding:8px 16px; background:linear-gradient(to bottom,#e0f4ff,#b6e4ff); border:2px solid #66b3ff; border-radius:999px; color:darkblue; font-weight:bold; cursor:pointer;">Submit Comment</button>
                <div id="comments-list" style="margin-top:15px;"></div>
            </div>
        </div>
        <div>
                <h2 style="color:darkblue; font-family: Helvetica, Arial, sans-serif;">Today's featured Pet</h2>
                <p id="featured-name" style="color:darkblue; font-family: Helvetica, Arial, sans-serif; font-size:18px; font-weight:700;">Harriet</p>

                <div id="poll-section" style="margin-top:12px; padding:10px; background: rgba(255,255,255,0.95); border-radius:8px; border:1px solid #d0eaff; max-width:320px;">
                    <div id="poll-question" style="color:green; font-weight:700; font-family: Helvetica, Arial, sans-serif; margin-bottom:8px;">Coming soon!</div>
                    <form id="poll-form" style="margin-bottom:8px; display:none;"></form>
                    <button id="vote-btn" disabled style="padding:6px 12px; border-radius:999px; border:2px solid #66b3ff; background: #ffffff; cursor:not-allowed; color: #88a;">Vote</button>
                    <div id="poll-results" style="margin-top:10px;"></div>
                </div>

                <p style="max-width:420px; color:darkblue; font-weight:700;">Hi! Welcome to my website! Its mainly about my interests! While your here, feel free to read my blog!</p>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const commentInput = document.getElementById('comment-input');
        const submitBtn = document.getElementById('submit-comment');
        const commentsList = document.getElementById('comments-list');
        const API_BASE = '';
        const userDisplay = document.getElementById('user-display');
        const logoutBtn = document.getElementById('logout-btn');
        const loginLink = document.getElementById('login-link');

        function getCurrentUser() { return localStorage.getItem('currentUser'); }

        function updateAuthUI() {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Login to comment';
                commentInput.placeholder = 'Please login to comment';
                userDisplay.style.display = 'none';
                logoutBtn.style.display = 'none';
                if (loginLink) loginLink.style.display = 'inline-block';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Comment';
                commentInput.placeholder = 'Leave a comment about Harriet...';
                userDisplay.textContent = 'Hi, ' + currentUser;
                userDisplay.style.display = 'inline-block';
                logoutBtn.style.display = 'inline-block';
                if (loginLink) loginLink.style.display = 'none';
            }
        }

        function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

        // Server interactions with local fallback
        async function serverLoadComments() {
            const res = await fetch(API_BASE + '/api/comments');
            if (!res.ok) throw new Error('Network');
            return await res.json();
        }

        async function serverPostComment(comment) {
            const res = await fetch(API_BASE + '/api/comments', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(comment)
            });
            if (!res.ok) throw new Error('Network');
            return await res.json();
        }

        async function serverLikeComment(id) {
            const res = await fetch(API_BASE + '/api/comments/' + encodeURIComponent(id) + '/like', { method: 'POST' });
            if (!res.ok) throw new Error('Network');
            return await res.json();
        }

        async function loadComments() {
            commentsList.innerHTML = '';
            try {
                const comments = await serverLoadComments();
                renderComments(comments, null);
            } catch (e) {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                renderComments(commentsData, null);
            }
        }

        function renderComments(comments, parentId) {
            comments.filter(c => c.parentId === parentId).forEach(function(comment) {
                const commentDiv = document.createElement('div');
                commentDiv.style.marginLeft = comment.parentId ? '20px' : '0';

                const usernameSpan = document.createElement('strong');
                usernameSpan.style.color = 'navy';
                usernameSpan.textContent = comment.username + ': ';
                commentDiv.appendChild(usernameSpan);

                const textSpan = document.createElement('span');
                textSpan.textContent = ' ' + comment.text;
                commentDiv.appendChild(textSpan);

                const actionsDiv = document.createElement('div');
                actionsDiv.style.marginTop = '8px';

                const likesBtn = document.createElement('button');
                likesBtn.textContent = '👍 ' + (comment.likes || 0);
                likesBtn.style.marginRight = '10px';
                likesBtn.style.border = 'none';
                likesBtn.style.background = 'none';
                likesBtn.style.cursor = 'pointer';
                likesBtn.style.color = 'darkblue';
                likesBtn.style.fontSize = '14px';
                likesBtn.onclick = () => handleLike(comment.id);
                actionsDiv.appendChild(likesBtn);

                const replyBtn = document.createElement('button');
                replyBtn.textContent = 'Reply';
                replyBtn.style.border = 'none';
                replyBtn.style.background = 'none';
                replyBtn.style.cursor = 'pointer';
                replyBtn.style.color = 'darkblue';
                replyBtn.style.fontSize = '14px';
                replyBtn.onclick = () => handleReply(comment.id);
                actionsDiv.appendChild(replyBtn);

                commentDiv.appendChild(actionsDiv);
                commentsList.appendChild(commentDiv);

                renderComments(comments, comment.id);
            });
        }

        async function handleLike(commentId) {
            try {
                await serverLikeComment(commentId);
                await loadComments();
            } catch (e) {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                const comment = commentsData.find(c => c.id === commentId);
                if (comment) {
                    comment.likes = (comment.likes || 0) + 1;
                    localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                    loadComments();
                }
            }
        }

        async function handleReply(parentId) {
            const replyText = prompt('Your reply:');
            const currentUser = getCurrentUser();
            if (!currentUser) { alert('Please login to reply'); return; }
            if (!replyText) return;
            const newComment = { id: generateId(), username: currentUser, text: replyText, parentId: parentId, likes: 0 };
            try {
                await serverPostComment(newComment);
                await loadComments();
            } catch (e) {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                commentsData.push(newComment);
                localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                loadComments();
            }
        }

        submitBtn.addEventListener('click', async function() {
            const text = commentInput.value.trim();
            const currentUser = getCurrentUser();
            if (!currentUser) { alert('Please login to comment!'); return; }
            if (!text) return;
            const newComment = { id: generateId(), username: currentUser, text: text, parentId: null, likes: 0 };
            try {
                await serverPostComment(newComment);
                commentInput.value = '';
                await loadComments();
            } catch (e) {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                commentsData.unshift(newComment);
                localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                commentInput.value = '';
                loadComments();
            }
        });

        // logout handler
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('currentUser');
            updateAuthUI();
        });

        function getCurrentUser() { return localStorage.getItem('currentUser'); }

        // Initialize
        updateAuthUI();
        loadComments();
        // Poll: load and render
        async function serverLoadPoll() {
            const res = await fetch(API_BASE + '/api/poll');
            if (!res.ok) throw new Error('Network');
            return await res.json();
        }

        async function serverVote(optionId) {
            const res = await fetch(API_BASE + '/api/poll/vote', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({option: optionId})
            });
            if (!res.ok) throw new Error('Network');
            return await res.json();
        }

        
    });
    </script>

</body>
</html>
