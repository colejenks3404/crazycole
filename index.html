<xai:function_call name="edit_file">
<parameter name="path">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const commentInput = document.getElementById('comment-input');
            const submitBtn = document.getElementById('submit-comment');
            const commentsList = document.getElementById('comments-list');
            const currentUser = localStorage.getItem('currentUser');

            if (!currentUser) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Login to comment';
                commentInput.placeholder = 'Please login to comment';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Comment';
                commentInput.placeholder = 'Leave a comment about Harriet...';
            }

            // Generate unique ID
            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            // Load comments data
            function loadComments() {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                commentsList.innerHTML = '';
                renderComments(commentsData, null);
            }

            function renderComments(comments, parentId) {
                comments.filter(c => c.parentId === parentId).forEach(function(comment) {
                    const commentDiv = document.createElement('div');
                    commentDiv.style = 'background: rgba(255,255,255,0.7); padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; color: darkblue; border-left: 4px solid #66b3ff; position: relative; margin-left: ' + (comment.parentId ? '20px' : '0') + ';';
                    
                    const usernameSpan = document.createElement('strong');
                    usernameSpan.style.color = 'navy';
                    usernameSpan.textContent = comment.username + ': ';
                    commentDiv.appendChild(usernameSpan);
                    
                    const textSpan = document.createElement('span');
                    textSpan.textContent = comment.text;
                    commentDiv.appendChild(textSpan);
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.style.marginTop = '8px';
                    
                    const likesBtn = document.createElement('button');
                    likesBtn.textContent = '👍 ' + (comment.likes || 0);
                    likesBtn.style.marginRight = '10px';
                    likesBtn.style.border = 'none';
                    likesBtn.style.background = 'none';
                    likesBtn.style.cursor = 'pointer';
                    likesBtn.style.color = 'darkblue';
                    likesBtn.style.fontSize = '14px';
                    likesBtn.onclick = () => handleLike(comment.id);
                    actionsDiv.appendChild(likesBtn);
                    
                    const replyBtn = document.createElement('button');
                    replyBtn.textContent = 'Reply';
                    replyBtn.style.border = 'none';
                    replyBtn.style.background = 'none';
                    replyBtn.style.cursor = 'pointer';
                    replyBtn.style.color = 'darkblue';
                    replyBtn.style.fontSize = '14px';
                    replyBtn.onclick = () => handleReply(comment.id);
                    actionsDiv.appendChild(replyBtn);
                    
                    commentDiv.appendChild(actionsDiv);
                    commentsList.appendChild(commentDiv);
                    
                    renderComments(commentsData, comment.id); // Recursive replies
                });
            }

            function handleLike(commentId) {
                const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                const comment = commentsData.find(c => c.id === commentId);
                if (comment) {
                    comment.likes = (comment.likes || 0) + 1;
                    localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                    loadComments();
                }
            }

            function handleReply(parentId) {
                const replyText = prompt('Your reply:');
                if (replyText && currentUser) {
                    const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                    const newComment = {
                        id: generateId(),
                        username: currentUser,
                        text: replyText,
                        parentId: parentId,
                        likes: 0
                    };
                    commentsData.push(newComment);
                    localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                    loadComments();
                } else if (!currentUser) {
                    alert('Please login to reply');
                }
            }

            // Submit comment
            submitBtn.addEventListener('click', function() {
                const text = commentInput.value.trim();
                if (text && currentUser) {
                    const commentsData = JSON.parse(localStorage.getItem('harrietCommentsData') || '[]');
                    const newComment = {
                        id: generateId(),
                        username: currentUser,
                        text: text,
                        parentId: null,
                        likes: 0
                    };
                    commentsData.unshift(newComment);
                    localStorage.setItem('harrietCommentsData', JSON.stringify(commentsData));
                    commentInput.value = '';
                    loadComments();
                } else if (!currentUser) {
                    alert('Please login to comment!');
                }
            });

            // Load on start
            loadComments();
        });
    </script>
