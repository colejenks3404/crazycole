<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Pics</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            color: #00008B;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            color: #00008B;
        }
        a {
            color: #00008B;
            text-decoration: none;
            font-size: 18px;
            margin: 10px;
        }
        a:hover {
            text-decoration: underline;
        }
        .nav {
            margin-bottom: 30px;
        }
        .content {
            margin-top: 30px;
        }
        form {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 2px 10px rgba(0, 0, 139, 0.1);
        }
        form h2 {
            color: #008000;
            font-size: 24px;
            margin-top: 0;
            font-family: Calibri, sans-serif;
        }
        label {
            display: block;
            margin: 15px 0 5px 0;
            text-align: left;
            color: #008000;
            font-weight: bold;
            font-family: Calibri, sans-serif;
        }
        input[type="text"],
        input[type="email"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #008000;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            font-family: Calibri, sans-serif;
            color: #008000;
        }
        input[type="submit"] {
            background-color: #00008B;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive;
            font-weight: bold;
        }
        input[type="submit"]:hover {
            background-color: #000061;
        }
    </style>
</head>
<body>
    <h1>Pet Pics</h1>
    
    <div class="nav">
        <a href="index.html">← Back Home</a>
    </div>
    
    <div class="content">
        <p>Check out today's featured pets! Submit your pet's picture using the form below to be featured on this page!</
        </p>
        
        <form onsubmit="handleSubmit(event)">
            <h2>Submit your pet to be featured on this page!</h2>
            
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="petname">Pet's Name:</label>
            <input type="text" id="petname" name="petname" required>
            
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            
            <input type="submit" value="Submit">
        </form>
        
        <script>
            function handleSubmit(event) {
                event.preventDefault();
                window.location.href = 'thankyou.html';
            }
        </script>
    </div>
</body>
</html>
